{% extends "match_reports/base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm">
            <div class="card-body text-center p-5">
                <h3 class="fw-bold mb-4">Confirm Deletion</h3>
                <p>Are you sure you want to delete the report<strong>{{ report.title }}</strong>?</p>
                <p class="fst-italic fs-6">This action cannot be undone.</p>
                <div class="d-flex justify-content-center mt-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3 mt-4">
                        <a href="{% url 'report_detail' object.pk %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Yes, delete it</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
