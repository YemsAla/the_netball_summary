<!DOCTYPE html>
<html>
<head>
    <title>{{ object.title }}</title>
</head>
<body>

    <h1>{{ object.title }}</h1>

    <p>{{ object.date }} | {{ object.team }}</p>

    {% if object.image %}
        <img src="{{ object.image.url }}" style="width:300px;">
    {% endif %}

    <p>{{ object.match_report }}</p>

    <hr>


    <!-- Comments Section -->

    <!-- Add Comment Form -->
    {% if user.is_authenticated %}
        <section>
            <h3>Leave a Comment</h3>
            <form method="POST" action="{% url 'add-comment' report.pk %}">
                {% csrf_token %}
                {{ comment_form.as_p }}
                <button type="submit">Submit</button>
            </form>
        </section>
    {% else %}
        <p><a href="{% url 'login' %}">Log in</a> to add a comment.</p>
    {% endif %}

</body>
</html>
