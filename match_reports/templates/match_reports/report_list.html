<!DOCTYPE html>
<html lang="en">
<head>
    <title>Netball Match Reports</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .report {
            background: white;
            padding: 15px;
            margin: 15px auto;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .report h2 {
            margin: 0 0 10px;
        }

        .meta {
            color: gray;
            font-size: 14px;
        }

        a {
            text-decoration: none;
            color: #007BFF;
        }
    </style>
</head>
<body>

    <h1>🏐 Netball Match Reports</h1>

    {% for report in object_list %}
        <div class="report">
            <h2>
                <a href="{% url 'report_detail' report.id %}">
                    {{ report.title }}
                </a>
            </h2>

            <p class="meta">
                {{ report.date }} | {{ report.team }}
            </p>

            <p>
                {{ report.summary|truncatewords:20 }}
            </p>
        </div>
    {% empty %}
        <p style="text-align:center;">No match reports yet.</p>
    {% endfor %}

</body>
</html>
