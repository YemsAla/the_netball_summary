{% extends "match_reports/base.html" %}

{% block content %}

<h1>🏐 Netball Match Reports</h1>

{% for report in object_list %}
    <div class="report">
        <h2>
            <a href="{% url 'report_detail' report.id %}">
                {{ report.title }}
            </a>
        </h2>

        <p class="meta">
            {{ report.date }} | {{ report.team }}
        </p>

        <p>
            {{ report.summary|truncatewords:20 }}
        </p>
    </div>
{% empty %}
    <p style="text-align:center;">No match reports yet.</p>
{% endfor %}

{% endblock %}
